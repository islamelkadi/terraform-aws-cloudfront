# Checkov configuration for terraform-aws-cloudfront
# Suppressions for checks that are not applicable to example/demo code

skip-check:
  # KMS IAM Policy - Intentional for flexible key policies in examples
  - CKV_AWS_111  # KMS module uses flexible IAM policies for demonstration purposes
  - CKV_AWS_356  # KMS module uses wildcard resources for flexibility in examples
  - CKV_AWS_109  # KMS module IAM policies are intentionally permissive for examples
  
  # Terraform Module Sources - Using semantic versioning tags
  - CKV_TF_1  # Using semantic version tags (?ref=v1.0.0) instead of commit hashes
  - CKV_TF_2  # Using semantic version tags (?ref=v1.0.0) which is a valid versioning strategy
  
  # S3 Lifecycle - Abort incomplete uploads
  - CKV_AWS_300  # Abort incomplete multipart upload rules are optional and use-case specific
  
  # CloudFront Origin Failover - Optional high availability feature
  - CKV_AWS_310  # Origin failover requires multiple origins and adds complexity
  
  # CloudFront Geo Restriction - Optional feature
  - CKV_AWS_374  # Geo restrictions are use-case specific
  
  # CloudFront TLS Version - Example uses default certificate
  - CKV_AWS_174  # Custom TLS configuration requires custom SSL certificate
  
  # CloudFront Response Headers Policy - Optional security feature
  - CKV2_AWS_32  # Response headers policies are optional
  
  # S3 Event Notifications - Use-case specific
  - CKV2_AWS_62  # S3 event notifications are use-case specific
  
  # CloudFront WAF with Log4j Protection - Optional security feature
  - CKV2_AWS_47  # WAF with Log4j protection adds cost and complexity
  
  # S3 Cross-Region Replication - Optional disaster recovery feature
  - CKV_AWS_144  # Cross-region replication adds cost and complexity
